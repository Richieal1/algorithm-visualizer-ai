<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Algorithm Visualizer AI</title>
<style>
:root{--bg:#090b12;--p:#111522;--p2:#181d2c;--b:#2a334b;--t:#edf2ff;--m:#929bb7;--a:#4f7ef5;--g:#35d48b;--y:#f4aa35;--r:#ef6574}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);font-family:Segoe UI,system-ui,sans-serif}button,input,select{font:inherit}button{cursor:pointer}.top{position:sticky;top:0;background:#0e111a;border-bottom:1px solid var(--b);padding:16px 22px 0;z-index:2}.brand{font-size:21px;font-weight:850}.sub,.muted,.hint{color:var(--m);font-size:12px}.tabs{display:flex;gap:4px;margin-top:12px;overflow:auto}.tab{background:0;border:0;color:var(--m);padding:10px 14px;border-bottom:2px solid transparent}.tab.on{color:var(--a);border-color:var(--a);font-weight:800}.wrap{max-width:1100px;margin:auto;padding:22px}.card{background:var(--p);border:1px solid var(--b);border-radius:10px;padding:15px;margin:14px 0}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:end}.field{flex:1;min-width:190px}.label{font-size:12px;color:var(--m);margin:0 0 6px}.inp{width:100%;background:var(--p2);border:1px solid var(--b);border-radius:8px;color:var(--t);padding:10px 12px}.btn{background:#202638;border:1px solid var(--b);border-radius:8px;color:var(--t);padding:10px 15px;font-weight:750}.primary{background:var(--a);border-color:var(--a)}.play{background:#102f22;border-color:#2fba7b;color:var(--g)}.pause{background:#30230f;border-color:#ba7b22;color:var(--y)}.msg{background:var(--p2);border:1px solid var(--b);border-radius:8px;padding:12px 14px;margin:14px 0;line-height:1.55}.cells,.bars{display:flex;gap:7px;align-items:flex-end}.cells{flex-wrap:wrap}.bars{height:180px}.cell{display:flex;flex-direction:column;gap:4px;align-items:center}.box{width:48px;height:46px;border-radius:8px;border:2px solid var(--b);background:var(--p2);display:flex;align-items:center;justify-content:center;font-family:Consolas,monospace;font-weight:850}.barw{flex:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:4px}.bar{width:100%;min-height:8px;border-radius:7px 7px 0 0;background:var(--a)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:14px}.badge,.chip{display:inline-flex;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:800}.badge{background:#4f7ef522;border:1px solid #4f7ef566;color:#9cb6ff}.chip{background:#10301f;border:1px solid #35d48b66;color:var(--g)}.api{background:#111a33;border-color:#4f7ef566;color:#a7bbff}.chat{height:380px;overflow:auto;display:flex;flex-direction:column;gap:10px}.bubble{max-width:84%;padding:11px 14px;border-radius:16px;background:var(--p2);border:1px solid var(--b);white-space:pre-wrap;line-height:1.55}.user{align-self:flex-end;background:var(--a);border-color:var(--a)}.ai{align-self:flex-start}.fab{position:fixed;right:22px;bottom:24px;width:56px;height:56px;border-radius:50%;background:var(--a);border:1px solid var(--a);color:white;font-weight:900}.drawer{position:fixed;right:0;top:0;width:min(390px,94vw);height:100vh;background:var(--p);border-left:1px solid var(--b);z-index:5;padding:14px;display:flex;flex-direction:column}.drawerHead{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--b);padding-bottom:12px;margin-bottom:12px}h2{font-size:18px;margin:0 0 6px}h3{font-size:15px;margin:0}@media(max-width:740px){.wrap{padding:16px}.drawer{width:100vw}.box{width:44px}.top{padding-left:16px;padding-right:16px}}
</style></head><body><div id="app"></div><script>
const C={blue:'#4f7ef5',green:'#35d48b',amber:'#f4aa35',red:'#ef6574',muted:'#929bb7',line:'#2a334b',dark:'#181d2c'},names={binary:'Binary Search',bubble:'Bubble Sort',selection:'Selection Sort'};
let tab='binary',drawer=false,topic='algoritma',msgs=[],timers={},aiProvider=localStorage.getItem('ai_provider')||'gemini';
const S={binary:{inp:'2 5 8 12 16 23 38 56 72 91',tgt:'23',arr:[],steps:[],i:-1,play:false},bubble:{inp:'64 34 25 12 22 11 90 45 37 60',steps:[],i:-1,play:false},selection:{inp:'64 34 25 12 22 11 90 45 37 60',steps:[],i:-1,play:false},compare:{l:{algo:'binary',inp:'2 5 8 12 16 23 38 56 72 91',tgt:'23',run:null},r:{algo:'bubble',inp:'64 34 25 12 22 11 90 45 37 60',tgt:'23',run:null}}};
const esc=x=>String(x).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])),nums=x=>x.trim().split(/\s+/).map(Number).filter(Number.isFinite),head=(t,b,d)=>`<h2>${t} <span class="badge">${b}</span></h2><div class="muted">${d}</div>`;
function stop(id){clearInterval(timers[id]);delete timers[id];if(S[id])S[id].play=false;let p=id[0]==='c'&&S.compare[id[1]];if(p&&p.run)p.run.play=false}function stopAll(){['binary','bubble','selection','cl','cr'].forEach(stop)}
function binarySteps(a,t){let s=[],l=0,h=a.length-1;while(l<=h){let m=Math.floor((l+h)/2),found=a[m]===t;s.push({l,h,m,found,done:found});if(found)break;if(a[m]<t)l=m+1;else h=m-1}if(!s.length)s.push({l:0,h:-1,m:-1,found:false,done:true});s[s.length-1].done=true;return s}
function bubbleSteps(input){let a=[...input],s=[],n=a.length,ok=Array(n).fill(false);for(let i=0;i<n-1;i++){for(let j=0;j<n-1-i;j++){s.push({a:[...a],c:[j,j+1],swap:false,ok:[...ok],x:a[j],y:a[j+1]});if(a[j]>a[j+1]){[a[j],a[j+1]]=[a[j+1],a[j]];s.push({a:[...a],c:[j,j+1],swap:true,ok:[...ok],x:a[j+1],y:a[j]})}}ok[n-1-i]=true}ok[0]=true;s.push({a:[...a],c:[],swap:false,ok,done:true});return s}
function selectionSteps(input){let a=[...input],s=[],n=a.length,ok=Array(n).fill(false);for(let i=0;i<n-1;i++){let min=i;for(let j=i+1;j<n;j++){s.push({a:[...a],c:[min,j],swap:false,ok:[...ok],x:a[min],y:a[j]});if(a[j]<a[min])min=j}if(min!==i){let x=a[i],y=a[min];[a[i],a[min]]=[a[min],a[i]];s.push({a:[...a],c:[i,min],swap:true,ok:[...ok],x,y})}ok[i]=true}ok[n-1]=true;s.push({a:[...a],c:[],swap:false,ok,done:true});return s}
function buildMain(id){if(id==='binary'){let raw=nums(S.binary.inp);if(!raw.length)return false;S.binary.arr=[...new Set(raw)].sort((a,b)=>a-b);let t=Number(S.binary.tgt);if(!Number.isFinite(t))return false;S.binary.steps=binarySteps(S.binary.arr,t);S.binary.i=0}else{let raw=nums(S[id].inp).slice(0,16);if(raw.length<2)return false;S[id].steps=id==='bubble'?bubbleSteps(raw):selectionSteps(raw);S[id].i=0}S[id].play=false;return true}
function runMain(id){stop(id);buildMain(id);render()}function stepMain(id,d){stop(id);let s=S[id];if(!s.steps.length)return;s.i=Math.max(0,Math.min(s.steps.length-1,s.i+d));render()}function playMain(id){let s=S[id];if(!s.steps.length&&!buildMain(id))return;if(s.i>=s.steps.length-1)s.i=0;if(s.play){stop(id);render();return}s.play=true;timers[id]=setInterval(()=>{let x=S[id];if(x.i>=x.steps.length-1){stop(id);render();return}x.i++;render()},650);render()}
function controls(id){let s=S[id];return `<div class="row"><button class="btn primary" onclick="runMain('${id}')">Mulai</button><button class="btn ${s.play?'pause':'play'}" onclick="playMain('${id}')">${s.play?'Pause':'Play'}</button><button class="btn" onclick="stepMain('${id}',-1)" ${s.i<=0?'disabled':''}>Prev</button><button class="btn" onclick="stepMain('${id}',1)" ${!s.steps.length||s.i>=s.steps.length-1?'disabled':''}>Next</button><button class="btn" onclick="stop('${id}');S.${id}.i=0;render()" ${!s.steps.length?'disabled':''}>Reset</button><span class="muted">${s.steps.length?`Langkah ${s.i+1}/${s.steps.length}`:'Belum mulai'}</span></div>`}
function binaryCell(v,i,c){let bg=C.dark,bd=C.line,tx='#edf2ff',label='.';if(c){if(i<c.l||i>c.h){bg='#10131b';tx=C.muted}else bd=C.blue;if(i===c.m){bg='#2a2012';bd=C.amber;tx=C.amber;label='mid'}if(i===c.l&&i!==c.m)label='L';if(i===c.h&&i!==c.m)label=label==='.'?'R':'L=R';if(c.found&&i===c.m){bg='#0f2b20';bd=C.green;tx=C.green}}return `<div class="cell"><span class="muted">${label}</span><div class="box" style="background:${bg};border-color:${bd};color:${tx}">${v}</div><span class="muted">${i}</span></div>`}
function binaryView(){let s=S.binary,c=s.steps[s.i],msg='Masukkan array dan target, lalu klik Mulai atau Play.';if(c)msg=c.found?`Target ${s.tgt} ditemukan di indeks ${c.m}.`:c.done?`Target ${s.tgt} tidak ada di array.`:s.arr[c.m]<Number(s.tgt)?`Nilai mid ${s.arr[c.m]} lebih kecil dari target, cari ke kanan.`:`Nilai mid ${s.arr[c.m]} lebih besar dari target, cari ke kiri.`;return `${head('Binary Search','O(log n)','Input acak akan diurutkan otomatis.')}<div class="card"><div class="row"><div class="field"><div class="label">Array angka</div><input class="inp" value="${esc(s.inp)}" oninput="S.binary.inp=this.value"></div><div style="width:150px"><div class="label">Target wajib</div><input class="inp" value="${esc(s.tgt)}" oninput="S.binary.tgt=this.value"></div></div></div><div class="card"><div class="cells">${s.arr.map((v,i)=>binaryCell(v,i,c)).join('')}</div></div><div class="msg">${msg}</div>${controls('binary')}`}
function bar(v,i,c,max){let col=C.blue;if(c){if(c.ok&&c.ok[i])col=C.green;else if(c.c&&c.c.includes(i))col=c.swap?C.red:C.amber}return `<div class="barw"><span class="muted">${v}</span><div class="bar" style="height:${Math.max(v/max*135,8)}px;background:${col}"></div><span class="muted">${i}</span></div>`}
function sortView(id){let s=S[id],is=id==='selection',c=s.steps[s.i],arr=c?c.a:[],max=Math.max(...arr,1),msg='Masukkan angka, lalu klik Mulai atau Play.';if(c)msg=c.done?'Array sudah terurut.':c.swap?`Tukar ${c.x} dengan ${c.y}.`:is?`Cari minimum: bandingkan ${c.x} dengan ${c.y}.`:`Bandingkan ${c.x} dengan ${c.y}.`;return `${head(is?'Selection Sort':'Bubble Sort','O(n^2)',is?'Cari nilai paling kecil dari sisa array.':'Bandingkan elemen bersebelahan lalu tukar jika salah.')}<div class="card"><div class="field"><div class="label">Array angka</div><input class="inp" value="${esc(s.inp)}" oninput="S.${id}.inp=this.value"></div></div><div class="card"><div class="bars">${arr.map((v,i)=>bar(v,i,c,max)).join('')}</div></div><div class="msg">${msg}</div>${controls(id)}`}
function buildCompare(pos){let p=S.compare[pos],raw=nums(p.inp).slice(0,16);if(p.algo==='binary'){if(!raw.length)return false;let arr=[...new Set(raw)].sort((a,b)=>a-b),t=Number(p.tgt);if(!Number.isFinite(t))return false;p.run={id:p.algo,arr,target:t,steps:binarySteps(arr,t),i:0,play:false}}else{if(raw.length<2)return false;p.run={id:p.algo,arr:raw,steps:p.algo==='bubble'?bubbleSteps(raw):selectionSteps(raw),i:0,play:false}}return true}
function runCmp(pos){stop('c'+pos);buildCompare(pos);render()}function stepCmp(pos,d){stop('c'+pos);let r=S.compare[pos].run;if(!r)return;r.i=Math.max(0,Math.min(r.steps.length-1,r.i+d));render()}function playCmp(pos){let p=S.compare[pos];if(!p.run&&!buildCompare(pos))return;let r=p.run;if(r.i>=r.steps.length-1)r.i=0;if(r.play){stop('c'+pos);render();return}r.play=true;timers['c'+pos]=setInterval(()=>{let run=S.compare[pos].run;if(!run||run.i>=run.steps.length-1){stop('c'+pos);render();return}run.i++;render()},650);render()}
function mini(pos){let p=S.compare[pos],id=p.algo,r=p.run,c=r&&r.steps[r.i],arr=id==='binary'?(r?r.arr:[...new Set(nums(p.inp))].sort((a,b)=>a-b)):(c?c.a:nums(p.inp).slice(0,16)),max=Math.max(...arr,1);let msg=!r?'Isi data lalu Mulai atau Play.':id==='binary'?(c.found?`Target ${r.target} ditemukan di indeks ${c.m}.`:c.done?`Target ${r.target} tidak ditemukan.`:`Cek tengah indeks ${c.m}, nilai ${r.arr[c.m]}.`):(c.done?'Array sudah terurut.':c.swap?`Tukar ${c.x} dan ${c.y}.`:`Bandingkan ${c.x} dan ${c.y}.`);return `<div class="card"><div class="row"><div class="field"><div class="label">Algoritma</div><select class="inp" onchange="stop('c${pos}');S.compare.${pos}.algo=this.value;S.compare.${pos}.run=null;render()">${Object.keys(names).map(x=>`<option value="${x}" ${id===x?'selected':''}>${names[x]}</option>`).join('')}</select></div><div class="field"><div class="label">Array angka</div><input class="inp" value="${esc(p.inp)}" oninput="stop('c${pos}');S.compare.${pos}.inp=this.value;S.compare.${pos}.run=null;render()"></div>${id==='binary'?`<div style="width:135px"><div class="label">Target wajib</div><input class="inp" value="${esc(p.tgt)}" oninput="stop('c${pos}');S.compare.${pos}.tgt=this.value;S.compare.${pos}.run=null;render()"></div>`:''}</div><div class="row" style="justify-content:space-between;margin-top:12px"><div><h3>${names[id]}</h3><div class="muted">${r?`Langkah ${r.i+1}/${r.steps.length}`:'Belum mulai'}</div></div><span class="badge">${id==='binary'?'O(log n)':'O(n^2)'}</span></div><div class="card"><div class="bars" style="height:145px">${arr.map((v,i)=>id==='binary'?`<div class="barw"><span class="muted">${v}</span><div class="bar" style="height:34px;background:${c&&i===c.m?C.amber:C.blue}">${i}</div></div>`:bar(v,i,c,max)).join('')}</div></div><div class="msg">${msg}</div><div class="row"><button class="btn primary" onclick="runCmp('${pos}')">Mulai</button><button class="btn ${r&&r.play?'pause':'play'}" onclick="playCmp('${pos}')">${r&&r.play?'Pause':'Play'}</button><button class="btn" onclick="stepCmp('${pos}',-1)" ${!r||r.i<=0?'disabled':''}>Prev</button><button class="btn" onclick="stepCmp('${pos}',1)" ${!r||r.i>=r.steps.length-1?'disabled':''}>Next</button></div></div>`}
function compareView(){return `<div class="card"><div class="row" style="justify-content:space-between"><div>${head('Compare Algorithms','custom input','Bandingkan proses dua algoritma. Binary Search punya target wajib.')}</div><span class="chip">Ada autoplay</span></div></div><div class="grid">${mini('l')}${mini('r')}</div>`}
function providerName(){return aiProvider==='free'?'AI Gratis':aiProvider==='gemini'?'Gemini API':aiProvider==='groq'?'Groq API':'OpenRouter'}
function chatView(){if(!msgs.length)msgs=[{role:'assistant',text:'Halo! Gemini, Groq, dan OpenRouter berjalan lewat Vercel. API key tidak ditampilkan di browser.'}];return `<div class="card"><div class="row"><div class="field"><div class="label">Provider AI</div><select class="inp" onchange="aiProvider=this.value;localStorage.setItem('ai_provider',aiProvider);render()"><option value="gemini" ${aiProvider==='gemini'?'selected':''}>Gemini API</option><option value="groq" ${aiProvider==='groq'?'selected':''}>Groq API</option><option value="openrouter" ${aiProvider==='openrouter'?'selected':''}>OpenRouter</option><option value="free" ${aiProvider==='free'?'selected':''}>AI Gratis</option></select></div><span class="chip ${aiProvider==='free'?'':'api'}">${providerName()}</span></div><div class="hint">Tidak ada kolom API key. Kunci AI disimpan di Environment Variables Vercel.</div></div><div class="chat" id="chat">${msgs.map(m=>`<div class="bubble ${m.role==='user'?'user':'ai'}">${esc(m.text)}</div>`).join('')}</div><div class="row" style="margin-top:12px"><input id="ask" class="inp" placeholder="Tanya sesuatu..." onkeydown="if(event.key==='Enter')send()"><button class="btn primary" onclick="send()">Kirim</button></div>`}
const API_URL=location.hostname.endsWith('github.io')?'https://algorithm-visualizer-ai.vercel.app/api/ai':'/api/ai';
async function askFree(prompt){let r=await fetch('https://text.pollinations.ai/'+encodeURIComponent(prompt)+'?model=openai');if(!r.ok)throw Error('AI gratis sedang sibuk');return (await r.text()).trim()}async function askApi(provider,prompt){let r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({provider,prompt})});let data=await r.json().catch(()=>({}));if(!r.ok||data.error)throw Error(data.error||`API gagal (${r.status})`);return (data.text||'').trim()}
async function send(){let box=document.getElementById('ask'),q=box&&box.value.trim();if(!q)return;msgs.push({role:'user',text:q});render();let prompt=`Topik saat ini: ${drawer?topic:tab}.\n\n${msgs.map(m=>`${m.role}: ${m.text}`).join('\n')}\nassistant:`;try{let ans=aiProvider==='free'?await askFree(prompt):await askApi(aiProvider,prompt);msgs.push({role:'assistant',text:ans||'Respons AI kosong.'})}catch(err){try{let fallback=await askFree(prompt);msgs.push({role:'assistant',text:`${providerName()} belum tersambung (${err.message}). Saya jawab lewat AI Gratis dulu:\n\n${fallback}`})}catch(_){msgs.push({role:'assistant',text:`${providerName()} error: ${err.message}`})}}render()}
function openAI(){drawer=true;topic={binary:'Binary Search',bubble:'Bubble Sort',selection:'Selection Sort'}[tab]||'algoritma';msgs=[];render()}function setTab(x){stopAll();tab=x;drawer=false;topic='algoritma';msgs=[];render()}
function render(){let body=tab==='binary'?binaryView():tab==='bubble'?sortView('bubble'):tab==='selection'?sortView('selection'):tab==='compare'?compareView():head('AI Chat','Vercel API','Gemini, Groq, dan OpenRouter lewat server Vercel.')+chatView();document.getElementById('app').innerHTML=`<header class="top"><div class="brand">Algorithm Visualizer AI</div><div class="sub">Binary Search - Bubble Sort - Selection Sort - Compare - AI Chat</div><nav class="tabs">${[['binary','Binary'],['bubble','Bubble'],['selection','Selection'],['compare','Compare'],['chat','AI Chat']].map(x=>`<button class="tab ${tab===x[0]?'on':''}" onclick="setTab('${x[0]}')">${x[1]}</button>`).join('')}</nav></header><main class="wrap">${body}</main>${['binary','bubble','selection'].includes(tab)?'<button class="fab" onclick="openAI()">AI</button>':''}${drawer?`<aside class="drawer"><div class="drawerHead"><div><b>AI Pendamping</b><div class="muted">${topic}</div></div><button class="btn" onclick="drawer=false;render()">X</button></div>${chatView()}</aside>`:''}`;setTimeout(()=>{let c=document.getElementById('chat');if(c)c.scrollTop=c.scrollHeight},0)}render();
</script></body></html>
