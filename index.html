<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Algorithm Visualizer AI</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#090b12;color:#dde1f0;font-family:Segoe UI,system-ui,sans-serif}button,input,select{font:inherit}button{cursor:pointer}.top{background:#11141e;border-bottom:1px solid #22263a;padding:16px 24px 0}.title{font-size:20px;font-weight:800}.sub,.muted{color:#676b88;font-size:12px}.tabs{display:flex;gap:2px;overflow:auto;margin-top:12px}.tab{background:0;border:0;color:#676b88;padding:10px 16px;border-bottom:2px solid transparent}.tab.on{color:#4f7ef5;border-color:#4f7ef5;font-weight:700}.wrap{max-width:900px;margin:auto;padding:24px}.card{background:#11141e;border:1px solid #22263a;border-radius:10px;padding:14px;margin:14px 0}.row{display:flex;gap:10px;flex-wrap:wrap}.field{flex:1;min-width:180px}.label{color:#676b88;font-size:12px;margin:0 0 5px}.inp{width:100%;background:#181b28;border:1px solid #22263a;border-radius:8px;color:#dde1f0;padding:9px 12px;outline:0}.btn{background:#181b28;border:1px solid #22263a;border-radius:8px;color:#dde1f0;padding:9px 16px;font-weight:700}.primary{background:#4f7ef5;border-color:#4f7ef5;color:white}.msg{background:#181b28;border:1px solid #22263a;border-radius:8px;padding:11px 14px;margin:14px 0;line-height:1.55;font-size:13px}.cells{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end}.cell{display:flex;flex-direction:column;align-items:center;gap:3px}.box{width:44px;height:44px;border-radius:8px;border:2px solid #22263a;background:#181b28;display:flex;align-items:center;justify-content:center;font-weight:800;font-family:monospace}.bars{height:165px;display:flex;align-items:flex-end;gap:4px}.barw{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:2px}.bar{width:100%;min-height:7px;border-radius:4px 4px 0 0;background:#4f7ef5}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:14px}.chat{height:390px;overflow:auto;display:flex;flex-direction:column;gap:10px}.bubble{max-width:82%;padding:10px 14px;border-radius:16px;background:#181b28;border:1px solid #22263a;white-space:pre-wrap;line-height:1.6}.user{align-self:flex-end;background:#4f7ef5;border-color:#4f7ef5;color:white}.ai{align-self:flex-start}.fab{position:fixed;right:22px;bottom:24px;width:54px;height:54px;border-radius:50%;background:#4f7ef5;border:1px solid #4f7ef5;color:white;font-weight:900;box-shadow:0 10px 30px #0008}.drawer{position:fixed;right:0;top:0;width:min(380px,94vw);height:100vh;background:#11141e;border-left:1px solid #22263a;z-index:5;padding:14px;display:flex;flex-direction:column}.head{display:flex;justify-content:space-between;gap:12px;align-items:center;border-bottom:1px solid #22263a;padding-bottom:12px;margin-bottom:12px}h2{font-size:17px;margin:0 0 6px}.badge{font-size:11px;color:#4f7ef5;background:#4f7ef522;border:1px solid #4f7ef566;border-radius:6px;padding:3px 8px;margin-left:8px}.note{font-size:11px;color:#676b88;margin-top:6px}@media(max-width:720px){.wrap{padding:18px}.fab{right:14px;bottom:16px}.drawer{width:100vw}}
</style>
</head>
<body><div id="app"></div><script>
const A='#4f7ef5',G='#3dd68c',Y='#f5a623',R='#f06472',P='#a78bfa',M='#676b88',B='#22263a';
let tab='binary',drawer=false,topic='algoritma',provider=localStorage.getItem('ai_provider')||'gemini',msgs=[];
const S={binary:{inp:'2 5 8 12 16 23 38 56 72 91',tgt:'23',arr:[],steps:[],i:-1},bubble:{inp:'64 34 25 12 22 11 90 45 37 60',steps:[],i:-1},selection:{inp:'64 34 25 12 22 11 90 45 37 60',steps:[],i:-1},compare:{l:'binary',r:'bubble',runs:{}}};
function e(x){return String(x).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function ns(x){return x.trim().split(/\s+/).map(Number).filter(Number.isFinite)}
function bs(a,t){let s=[],l=0,h=a.length-1;while(l<=h){let m=Math.floor((l+h)/2),f=a[m]===t;s.push({l,h,m,f:f?m:-1,d:f});if(f)break;a[m]<t?l=m+1:h=m-1}if(!s.length)s=[{l:0,h:-1,m:-1,f:-1,d:true}];s[s.length-1].d=true;return s}
function bub(a){a=[...a];let s=[],n=a.length,ok=Array(n).fill(false);for(let i=0;i<n-1;i++){for(let j=0;j<n-1-i;j++){let x=a[j],y=a[j+1];s.push({a:[...a],c:[j,j+1],sw:false,ok:[...ok],x,y});if(a[j]>a[j+1]){[a[j],a[j+1]]=[a[j+1],a[j]];s.push({a:[...a],c:[j,j+1],sw:true,ok:[...ok],x,y})}}ok[n-1-i]=true}ok[0]=true;s.push({a:[...a],c:[],sw:false,ok,d:true});return s}
function sel(a){a=[...a];let s=[],n=a.length,ok=Array(n).fill(false);for(let i=0;i<n-1;i++){let m=i;for(let j=i+1;j<n;j++){s.push({a:[...a],c:[m,j],sw:false,ok:[...ok],x:a[m],y:a[j]});if(a[j]<a[m])m=j}if(m!==i){let x=a[i],y=a[m];[a[i],a[m]]=[a[m],a[i]];s.push({a:[...a],c:[i,m],sw:true,ok:[...ok],x,y})}ok[i]=true}ok[n-1]=true;s.push({a:[...a],c:[],sw:false,ok,d:true});return s}
function title(t,b,d){return `<h2>${t}<span class="badge">${b}</span></h2><p class="muted">${d}</p>`}
function controls(id){let s=S[id];return `<div class="row"><button class="btn" onclick="move('${id}',-1)" ${s.i<=0?'disabled':''}>Prev</button><button class="btn" onclick="move('${id}',1)" ${s.i>=s.steps.length-1?'disabled':''}>Next</button><button class="btn" onclick="S.${id}.i=0;render()">Reset</button><span class="muted">Langkah ${s.i+1}/${s.steps.length}</span></div>`}
function binary(){let s=S.binary,c=s.steps[s.i],msg='Masukkan array dan target, lalu klik Mulai';if(c)msg=c.f>=0?`Nilai ${s.tgt} ditemukan di indeks ${c.f}.`:c.d?`Nilai ${s.tgt} tidak ada dalam array.`:s.arr[c.m]<+s.tgt?`Mid ${s.arr[c.m]} lebih kecil, geser Left ke ${c.m+1}.`:`Mid ${s.arr[c.m]} lebih besar, geser Right ke ${c.m-1}.`;return title('Binary Search','O(log n)','Binary Search harus memakai array terurut. Input acak akan diurutkan otomatis.')+`<div class="row"><div class="field"><div class="label">Array angka</div><input class="inp" value="${e(s.inp)}" oninput="S.binary.inp=this.value"><div class="note">Target pencarian adalah angka yang ingin dicari di array.</div></div><div style="width:130px"><div class="label">Target</div><input class="inp" value="${e(s.tgt)}" oninput="S.binary.tgt=this.value"></div><button class="btn primary" style="align-self:flex-end" onclick="runBinary()">Mulai</button></div><div class="card"><div class="cells">${s.arr.map((v,i)=>{let bg='#181b28',bd=B,tx='#dde1f0',lab='.';if(c){if(i===c.m){bg='#2a2012';bd=Y;tx=Y;lab='mid'}else if(i<c.l||i>c.h){bg='#11141e';tx=M}else{bg='#141b2e';bd=A}if(i===c.l&&i!==c.m)lab='L';if(i===c.h&&i!==c.m)lab=lab==='.'?'R':'L=R';if(c.f>=0&&i===c.m){bg='#0e2a1f';bd=G;tx=G}}return `<div class="cell"><span class="muted">${lab}</span><div class="box" style="background:${bg};border-color:${bd};color:${tx}">${v}</div><span class="muted">${i}</span></div>`}).join('')}</div></div><div class="msg">${msg}</div>${s.steps.length?controls('binary'):''}`}
function sort(id){let s=S[id],is=id==='selection',c=s.steps[s.i],arr=c?c.a:[],max=Math.max(...arr,1),msg='Masukkan angka dan klik Mulai';if(c)msg=c.d?'Array telah terurut.':c.sw?`Tukar ${c.x} dengan ${c.y}.`:is?`Cari minimum: bandingkan ${c.x} dengan ${c.y}.`:`Bandingkan ${c.x} dengan ${c.y}.`;return title(is?'Selection Sort':'Bubble Sort','O(n²)',is?'Cari minimum dari sisa array lalu tukar ke posisi benar.':'Bandingkan elemen bersebelahan lalu tukar jika belum urut.')+`<div class="row"><div class="field"><div class="label">Array angka</div><input class="inp" value="${e(s.inp)}" oninput="S.${id}.inp=this.value"></div><button class="btn primary" style="align-self:flex-end" onclick="runSort('${id}')">Mulai</button></div><div class="card"><div class="bars">${arr.map((v,i)=>{let col=A;if(c){if(c.ok&&c.ok[i])col=G;else if(c.c&&c.c.includes(i))col=c.sw?R:Y}return `<div class="barw"><span class="muted">${v}</span><div class="bar" style="height:${Math.max(v/max*130,7)}px;background:${col}"></div><span class="muted">${i}</span></div>`}).join('')}</div></div><div class="msg">${msg}</div>${s.steps.length?controls(id):''}`}
function runBinary(){let raw=ns(S.binary.inp);if(!raw.length)return;S.binary.arr=[...new Set(raw)].sort((a,b)=>a-b);S.binary.steps=bs(S.binary.arr,+S.binary.tgt);S.binary.i=0;render()}function runSort(id){let raw=ns(S[id].inp).slice(0,16);if(raw.length<2)return;S[id].steps=id==='bubble'?bub(raw):sel(raw);S[id].i=0;render()}function move(id,d){S[id].i=Math.max(0,Math.min(S[id].steps.length-1,S[id].i+d));render()}
function runFor(id){let base=id==='binary'?[2,5,8,12,16,23,38,56,72,91]:[64,34,25,12,22,11,90,45,37,60];return{id,base,steps:id==='binary'?bs(base,23):id==='bubble'?bub(base):sel(base),i:0}}
function mini(pos){let id=S.compare[pos],r=S.compare.runs[pos+id],c=r&&r.steps[r.i],arr=id==='binary'?(r?r.base:[2,5,8,12,16,23,38,56,72,91]):(c?c.a:[64,34,25,12,22,11,90,45,37,60]),max=Math.max(...arr,1),name={binary:'Binary Search',bubble:'Bubble Sort',selection:'Selection Sort'}[id];return `<div class="card"><b>${name}</b><div class="bars" style="height:140px;margin-top:10px">${arr.map((v,i)=>{let col=id==='binary'?A:A;if(c){if(id==='binary')col=i===c.m?Y:(i<c.l||i>c.h?B:A);else if(c.ok&&c.ok[i])col=G;else if(c.c&&c.c.includes(i))col=c.sw?R:Y}return `<div class="barw"><span class="muted">${v}</span><div class="bar" style="height:${id==='binary'?34:Math.max(v/max*90,7)}px;background:${col}">${id==='binary'?i:''}</div></div>`}).join('')}</div><div class="row"><button class="btn primary" onclick="S.compare.runs['${pos+id}']=runFor('${id}');render()">Mulai</button><button class="btn" onclick="cmp('${pos}',-1)" ${!r||r.i<=0?'disabled':''}>Prev</button><button class="btn" onclick="cmp('${pos}',1)" ${!r||r.i>=r.steps.length-1?'disabled':''}>Next</button></div></div>`}
function compare(){let opt=['binary','bubble','selection'].map(x=>`<option value="${x}">${x}</option>`).join('');return title('Compare Algorithms','Menu khusus','Bandingkan proses dua algoritma secara berdampingan.')+`<div class="row"><div class="field"><div class="label">Proses kiri</div><select class="inp" onchange="S.compare.l=this.value;render()">${opt.replace('value="'+S.compare.l+'"','value="'+S.compare.l+'" selected')}</select></div><div class="field"><div class="label">Proses kanan</div><select class="inp" onchange="S.compare.r=this.value;render()">${opt.replace('value="'+S.compare.r+'"','value="'+S.compare.r+'" selected')}</select></div></div><div class="grid">${mini('l')}${mini('r')}</div>`}
function cmp(pos,d){let id=S.compare[pos],r=S.compare.runs[pos+id];if(!r)return;r.i=Math.max(0,Math.min(r.steps.length-1,r.i+d));render()}
function chat(){if(!msgs.length)msgs=[{role:'assistant',text:drawer?`Saya AI pendamping untuk ${topic}.`:'Halo! Tanya apa saja tentang algoritma dan pemrograman.'}];let key=localStorage.getItem(provider+'_api_key')||'';return `<div class="card"><div class="row"><div class="field"><div class="label">Provider AI</div><select class="inp" onchange="provider=this.value;localStorage.setItem('ai_provider',provider);render()"><option value="gemini" ${provider==='gemini'?'selected':''}>Gemini API</option><option value="groq" ${provider==='groq'?'selected':''}>Groq</option></select></div><div class="field"><div class="label">API key ${provider==='groq'?'Groq':'Gemini'}</div><input class="inp" type="password" value="${e(key)}" placeholder="${provider==='groq'?'gsk_...':'AIza...'}" oninput="localStorage.setItem(provider+'_api_key',this.value)"></div></div></div><div class="chat" id="chat">${msgs.map(m=>`<div class="bubble ${m.role==='user'?'user':'ai'}">${e(m.text)}</div>`).join('')}</div><div class="row" style="margin-top:12px"><input id="ask" class="inp" placeholder="Tanya sesuatu..." onkeydown="if(event.key==='Enter')send()"><button class="btn primary" onclick="send()">Kirim</button></div>`}
async function send(){let q=document.getElementById('ask')?.value.trim();if(!q)return;msgs.push({role:'user',text:q});render();let key=localStorage.getItem(provider+'_api_key')||'',system={role:'system',text:`Jawab singkat dalam Bahasa Indonesia. Topik: ${topic}.`};try{let ans;if(provider==='groq'){let r=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+key},body:JSON.stringify({model:'llama-3.1-8b-instant',messages:[system,...msgs].map(m=>({role:m.role,content:m.text})),max_tokens:900})});let j=await r.json();if(!r.ok)throw Error(j.error?.message||'Groq gagal');ans=j.choices?.[0]?.message?.content}else{let r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent',{method:'POST',headers:{'Content-Type':'application/json','x-goog-api-key':key},body:JSON.stringify({contents:msgs.map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.text}]}))})});let j=await r.json();if(!r.ok)throw Error(j.error?.message||'Gemini gagal');ans=(j.candidates?.[0]?.content?.parts||[]).map(p=>p.text||'').join('')}msgs.push({role:'assistant',text:ans||'Respons kosong.'})}catch(err){msgs.push({role:'assistant',text:'AI error: '+err.message})}render()}
function openAI(){drawer=true;topic={binary:'Binary Search',bubble:'Bubble Sort',selection:'Selection Sort'}[tab];msgs=[];render()}function setTab(x){tab=x;drawer=false;topic='algoritma';msgs=[];render()}
function render(){let body=tab==='binary'?binary():tab==='bubble'?sort('bubble'):tab==='selection'?sort('selection'):tab==='compare'?compare():title('AI Chat','Gemini/Groq','Masukkan API key Gemini atau Groq lalu mulai bertanya.')+chat();document.getElementById('app').innerHTML=`<div class="top"><div class="title">Algorithm Visualizer AI</div><div class="sub">Binary Search • Bubble Sort • Selection Sort • AI Chat</div><div class="tabs">${['binary','bubble','selection','compare','chat'].map(x=>`<button class="tab ${tab===x?'on':''}" onclick="setTab('${x}')">${x}</button>`).join('')}</div></div><main class="wrap">${body}</main>${['binary','bubble','selection'].includes(tab)?'<button class="fab" onclick="openAI()">AI</button>':''}${drawer?`<div class="drawer"><div class="head"><div><b>AI Pendamping</b><div class="muted">${topic}</div></div><button class="btn" onclick="drawer=false;render()">X</button></div>${chat()}</div>`:''}`;setTimeout(()=>{let c=document.getElementById('chat');if(c)c.scrollTop=c.scrollHeight},0)}
render();
</script></body></html>
