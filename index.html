<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Algorithm Visualizer AI</title>
<style>
:root{--bg:#090b12;--surface:#11141e;--panel:#181b28;--border:#242a3d;--text:#e7ebf8;--muted:#7a809b;--blue:#4f7ef5;--green:#35d48b;--amber:#f3a524;--red:#f06472}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Segoe UI,system-ui,sans-serif}button,input,select{font:inherit}button{cursor:pointer;transition:.16s}button:hover:not(:disabled){opacity:.86}button:disabled{opacity:.45;cursor:not-allowed}.top{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px 0}.title{font-size:20px;font-weight:800}.sub,.muted{color:var(--muted);font-size:12px}.tabs{display:flex;gap:2px;overflow:auto;margin-top:12px}.tab{background:0;border:0;color:var(--muted);padding:10px 16px;border-bottom:2px solid transparent;white-space:nowrap}.tab.on{color:var(--blue);border-color:var(--blue);font-weight:700}.wrap{max-width:980px;margin:auto;padding:24px}.card,.compare-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin:14px 0}.soft,.arena{background:var(--panel)}.row{display:flex;gap:10px;flex-wrap:wrap}.field{flex:1;min-width:180px}.label{color:var(--muted);font-size:12px;margin:0 0 5px}.inp{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 12px;outline:0}.btn{background:var(--panel);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 16px;font-weight:700}.primary{background:var(--blue);border-color:var(--blue);color:white}.play{background:#10301f;border-color:#35d48b66;color:var(--green)}.pause{background:#2d2110;border-color:#f3a52466;color:var(--amber)}.msg,.mini-msg{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:11px 14px;margin:14px 0;line-height:1.55;font-size:13px;min-height:42px}.cells{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end}.cell{display:flex;flex-direction:column;align-items:center;gap:3px}.box{width:44px;height:44px;border-radius:8px;border:2px solid var(--border);background:var(--panel);display:flex;align-items:center;justify-content:center;font-weight:800;font-family:monospace}.bars{height:165px;display:flex;align-items:flex-end;gap:4px}.barw{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:2px;min-width:0}.bar{width:100%;min-height:7px;border-radius:4px 4px 0 0;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:white}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:14px}.chat{height:390px;overflow:auto;display:flex;flex-direction:column;gap:10px}.bubble{max-width:82%;padding:10px 14px;border-radius:16px;background:var(--panel);border:1px solid var(--border);white-space:pre-wrap;line-height:1.6}.user{align-self:flex-end;background:var(--blue);border-color:var(--blue);color:white}.ai{align-self:flex-start}.fab{position:fixed;right:22px;bottom:24px;width:54px;height:54px;border-radius:50%;background:var(--blue);border:1px solid var(--blue);color:white;font-weight:900;box-shadow:0 10px 30px #0008}.drawer{position:fixed;right:0;top:0;width:min(390px,94vw);height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:5;padding:14px;display:flex;flex-direction:column}.head{display:flex;justify-content:space-between;gap:12px;align-items:center;border-bottom:1px solid var(--border);padding-bottom:12px;margin-bottom:12px}h2{font-size:17px;margin:0 0 6px}.badge{font-size:11px;color:var(--blue);background:#4f7ef522;border:1px solid #4f7ef566;border-radius:6px;padding:3px 8px;margin-left:8px}.note{font-size:11px;color:var(--muted);margin-top:6px}.compare-hero{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;background:linear-gradient(180deg,#151a28,#10131d);border:1px solid var(--border);border-radius:10px;padding:16px;margin:14px 0}.statline{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}.stat{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:9px}.stat b{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}.arena{border:1px solid var(--border);border-radius:9px;padding:12px}.stepbar{height:6px;background:#0c0f18;border-radius:99px;overflow:hidden;margin:10px 0}.stepbar i{display:block;height:100%;background:var(--blue)}.provider-chip{display:inline-flex;align-items:center;background:#10301f;border:1px solid #35d48b66;color:var(--green);border-radius:99px;padding:5px 10px;font-size:12px;font-weight:700}@media(max-width:720px){.wrap{padding:18px}.statline{grid-template-columns:1fr}.fab{right:14px;bottom:16px}.drawer{width:100vw}.top{padding-left:16px;padding-right:16px}}
</style>
</head>
<body><div id="app"></div><script>
const A='#4f7ef5',G='#35d48b',Y='#f3a524',R='#f06472',M='#7a809b',B='#242a3d';
let tab='binary',drawer=false,topic='algoritma',msgs=[],timers={};
const names={binary:'Binary Search',bubble:'Bubble Sort',selection:'Selection Sort'};
const meta={binary:{big:'O(log n)',goal:'Mencari target',data:'Harus terurut',style:'Bagi dua'},bubble:{big:'O(n^2)',goal:'Mengurutkan',data:'Boleh acak',style:'Tukar tetangga'},selection:{big:'O(n^2)',goal:'Mengurutkan',data:'Boleh acak',style:'Cari minimum'}};
const S={binary:{inp:'2 5 8 12 16 23 38 56 72 91',tgt:'23',arr:[],steps:[],i:-1,play:false},bubble:{inp:'64 34 25 12 22 11 90 45 37 60',steps:[],i:-1,play:false},selection:{inp:'64 34 25 12 22 11 90 45 37 60',steps:[],i:-1,play:false},compare:{l:{algo:'binary',inp:'2 5 8 12 16 23 38 56 72 91',tgt:'23',run:null},r:{algo:'bubble',inp:'64 34 25 12 22 11 90 45 37 60',tgt:'23',run:null}}};
function e(x){return String(x).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function ns(x){return x.trim().split(/\s+/).map(Number).filter(Number.isFinite)}
function bs(a,t){let s=[],l=0,h=a.length-1;while(l<=h){let m=Math.floor((l+h)/2),f=a[m]===t;s.push({l,h,m,f:f?m:-1,d:f});if(f)break;a[m]<t?l=m+1:h=m-1}if(!s.length)s=[{l:0,h:-1,m:-1,f:-1,d:true}];s[s.length-1].d=true;return s}
function bub(a){a=[...a];let s=[],n=a.length,ok=Array(n).fill(false);for(let i=0;i<n-1;i++){for(let j=0;j<n-1-i;j++){let x=a[j],y=a[j+1];s.push({a:[...a],c:[j,j+1],sw:false,ok:[...ok],x,y});if(a[j]>a[j+1]){[a[j],a[j+1]]=[a[j+1],a[j]];s.push({a:[...a],c:[j,j+1],sw:true,ok:[...ok],x,y})}}ok[n-1-i]=true}ok[0]=true;s.push({a:[...a],c:[],sw:false,ok,d:true});return s}
function sel(a){a=[...a];let s=[],n=a.length,ok=Array(n).fill(false);for(let i=0;i<n-1;i++){let m=i;for(let j=i+1;j<n;j++){s.push({a:[...a],c:[m,j],sw:false,ok:[...ok],x:a[m],y:a[j]});if(a[j]<a[m])m=j}if(m!==i){let x=a[i],y=a[m];[a[i],a[m]]=[a[m],a[i]];s.push({a:[...a],c:[i,m],sw:true,ok:[...ok],x,y})}ok[i]=true}ok[n-1]=true;s.push({a:[...a],c:[],sw:false,ok,d:true});return s}
function title(t,b,d){return `<h2>${t}<span class="badge">${b}</span></h2><p class="muted">${d}</p>`}
function stop(id){clearInterval(timers[id]);delete timers[id];let s=S[id];if(s)s.play=false}function stopAll(){['binary','bubble','selection','cl','cr'].forEach(stop)}
function makeMain(id){if(id==='binary'){let raw=ns(S.binary.inp);if(!raw.length)return false;S.binary.arr=[...new Set(raw)].sort((a,b)=>a-b);S.binary.steps=bs(S.binary.arr,+S.binary.tgt);S.binary.i=0}else{let raw=ns(S[id].inp).slice(0,16);if(raw.length<2)return false;S[id].steps=id==='bubble'?bub(raw):sel(raw);S[id].i=0}S[id].play=false;return true}
function runMain(id){stop(id);makeMain(id);render()}function move(id,d){stop(id);let s=S[id];s.i=Math.max(0,Math.min(s.steps.length-1,s.i+d));render()}function playMain(id){let s=S[id];if(!s.steps.length&&!makeMain(id))return;if(s.i>=s.steps.length-1)s.i=0;if(s.play){stop(id);render();return}s.play=true;timers[id]=setInterval(()=>{let x=S[id];if(x.i>=x.steps.length-1){stop(id);render();return}x.i++;render()},650);render()}
function mainControls(id){let s=S[id];return `<div class="row"><button class="btn primary" onclick="runMain('${id}')">Mulai</button><button class="btn ${s.play?'pause':'play'}" onclick="playMain('${id}')">${s.play?'Pause':'Play'}</button><button class="btn" onclick="move('${id}',-1)" ${s.i<=0?'disabled':''}>Prev</button><button class="btn" onclick="move('${id}',1)" ${!s.steps.length||s.i>=s.steps.length-1?'disabled':''}>Next</button><button class="btn" onclick="stop('${id}');S.${id}.i=0;render()" ${!s.steps.length?'disabled':''}>Reset</button><span class="muted">${s.steps.length?`Langkah ${s.i+1}/${s.steps.length}`:'Belum mulai'}</span></div>`}
function binary(){let s=S.binary,c=s.steps[s.i],msg='Masukkan array dan target, lalu klik Mulai atau Play';if(c)msg=c.f>=0?`Nilai ${s.tgt} ditemukan di indeks ${c.f}.`:c.d?`Nilai ${s.tgt} tidak ada dalam array.`:s.arr[c.m]<+s.tgt?`Mid ${s.arr[c.m]} lebih kecil, geser Left ke ${c.m+1}.`:`Mid ${s.arr[c.m]} lebih besar, geser Right ke ${c.m-1}.`;return title('Binary Search','O(log n)','Binary Search harus memakai array terurut. Input acak akan diurutkan otomatis.')+`<div class="row"><div class="field"><div class="label">Array angka</div><input class="inp" value="${e(s.inp)}" oninput="S.binary.inp=this.value"><div class="note">Target pencarian adalah angka yang ingin dicari.</div></div><div style="width:140px"><div class="label">Target wajib</div><input class="inp" value="${e(s.tgt)}" oninput="S.binary.tgt=this.value"></div></div><div class="card"><div class="cells">${s.arr.map((v,i)=>cellBinary(v,i,c)).join('')}</div></div><div class="msg">${msg}</div>${mainControls('binary')}`}
function cellBinary(v,i,c){let bg='#181b28',bd=B,tx='#e7ebf8',lab='.';if(c){if(i===c.m){bg='#2a2012';bd=Y;tx=Y;lab='mid'}else if(i<c.l||i>c.h){bg='#11141e';tx=M}else{bg='#141b2e';bd=A}if(i===c.l&&i!==c.m)lab='L';if(i===c.h&&i!==c.m)lab=lab==='.'?'R':'L=R';if(c.f>=0&&i===c.m){bg='#0e2a1f';bd=G;tx=G}}return `<div class="cell"><span class="muted">${lab}</span><div class="box" style="background:${bg};border-color:${bd};color:${tx}">${v}</div><span class="muted">${i}</span></div>`}
function sort(id){let s=S[id],is=id==='selection',c=s.steps[s.i],arr=c?c.a:[],max=Math.max(...arr,1),msg='Masukkan angka, lalu klik Mulai atau Play';if(c)msg=c.d?'Array telah terurut.':c.sw?`Tukar ${c.x} dengan ${c.y}.`:is?`Cari minimum: bandingkan ${c.x} dengan ${c.y}.`:`Bandingkan ${c.x} dengan ${c.y}.`;return title(is?'Selection Sort':'Bubble Sort','O(n^2)',is?'Cari minimum dari sisa array lalu tukar ke posisi benar.':'Bandingkan elemen bersebelahan lalu tukar jika belum urut.')+`<div class="row"><div class="field"><div class="label">Array angka</div><input class="inp" value="${e(s.inp)}" oninput="S.${id}.inp=this.value"></div></div><div class="card"><div class="bars">${arr.map((v,i)=>bar(v,i,c,max)).join('')}</div></div><div class="msg">${msg}</div>${mainControls(id)}`}
function bar(v,i,c,max){let col=A;if(c){if(c.ok&&c.ok[i])col=G;else if(c.c&&c.c.includes(i))col=c.sw?R:Y}return `<div class="barw"><span class="muted">${v}</span><div class="bar" style="height:${Math.max(v/max*130,7)}px;background:${col}"></div><span class="muted">${i}</span></div>`}
function makeCompare(pos){let p=S.compare[pos],id=p.algo,raw=ns(p.inp).slice(0,16);if(id==='binary'){if(!raw.length)return false;let arr=[...new Set(raw)].sort((a,b)=>a-b),t=Number(p.tgt);if(!Number.isFinite(t))return false;p.run={id,arr,target:t,steps:bs(arr,t),i:0,play:false}}else{if(raw.length<2)return false;p.run={id,arr:raw,target:null,steps:id==='bubble'?bub(raw):sel(raw),i:0,play:false}}return true}
function startCmp(pos){stop('c'+pos);makeCompare(pos);render()}function moveCmp(pos,d){stop('c'+pos);let r=S.compare[pos].run;if(!r)return;r.i=Math.max(0,Math.min(r.steps.length-1,r.i+d));render()}function playCmp(pos){let p=S.compare[pos];if(!p.run&&!makeCompare(pos))return;let r=p.run;if(r.i>=r.steps.length-1)r.i=0;if(r.play){stop('c'+pos);render();return}r.play=true;timers['c'+pos]=setInterval(()=>{let run=S.compare[pos].run;if(!run){stop('c'+pos);render();return}if(run.i>=run.steps.length-1){stop('c'+pos);render();return}run.i++;render()},650);render()}function resetCmp(pos){stop('c'+pos);let r=S.compare[pos].run;if(r)r.i=0;render()}
function algoMsg(id,r,c){if(!r)return id==='binary'?'Isi array dan target, lalu Mulai atau Play.':'Isi array, lalu Mulai atau Play.';if(id==='binary')return c.f>=0?`Target ${r.target} ditemukan di indeks ${c.f}.`:c.d?`Target ${r.target} tidak ditemukan.`:`Cek mid indeks ${c.m}. Nilainya ${r.arr[c.m]}.`;if(c.d)return 'Array sudah terurut.';return c.sw?`Tukar ${c.x} dan ${c.y}.`:`Bandingkan ${c.x} dan ${c.y}.`}
function previewArr(p){let raw=ns(p.inp).slice(0,16);return p.algo==='binary'?[...new Set(raw)].sort((a,b)=>a-b):raw}
function mini(pos){let p=S.compare[pos],id=p.algo,r=p.run,c=r&&r.steps[r.i],arr=id==='binary'?(r?r.arr:previewArr(p)):(c?c.a:previewArr(p)),max=Math.max(...arr,1),m=meta[id],pct=r?Math.round((r.i+1)/r.steps.length*100):0;return `<div class="compare-card"><div class="row"><div class="field"><div class="label">Algoritma</div>${selectAlgo(pos)}</div><div class="field"><div class="label">Array angka</div><input class="inp" value="${e(p.inp)}" oninput="stop('c${pos}');S.compare.${pos}.inp=this.value;S.compare.${pos}.run=null;render()"></div>${id==='binary'?`<div style="width:130px"><div class="label">Target wajib</div><input class="inp" value="${e(p.tgt)}" oninput="stop('c${pos}');S.compare.${pos}.tgt=this.value;S.compare.${pos}.run=null;render()"></div>`:''}</div><div class="row" style="justify-content:space-between;align-items:flex-start;margin-top:12px"><div><div class="algo-name"><b>${names[id]}</b></div><div class="muted">${r?`Langkah ${r.i+1}/${r.steps.length}`:'Belum mulai'}</div></div><span class="badge">${m.big}</span></div><div class="statline"><div class="stat"><b>Tujuan</b>${m.goal}</div><div class="stat"><b>Data</b>${m.data}</div><div class="stat"><b>Gaya</b>${m.style}</div></div><div class="arena"><div class="bars" style="height:145px">${arr.map((v,i)=>id==='binary'?compareBinaryCell(v,i,c):bar(v,i,c,max)).join('')}</div><div class="stepbar"><i style="width:${pct}%"></i></div><div class="mini-msg">${algoMsg(id,r,c)}</div></div><div class="row" style="margin-top:12px"><button class="btn primary" onclick="startCmp('${pos}')">Mulai</button><button class="btn ${r&&r.play?'pause':'play'}" onclick="playCmp('${pos}')">${r&&r.play?'Pause':'Play'}</button><button class="btn" onclick="moveCmp('${pos}',-1)" ${!r||r.i<=0?'disabled':''}>Prev</button><button class="btn" onclick="moveCmp('${pos}',1)" ${!r||r.i>=r.steps.length-1?'disabled':''}>Next</button><button class="btn" onclick="resetCmp('${pos}')" ${!r?'disabled':''}>Reset</button></div></div>`}
function compareBinaryCell(v,i,c){let col=A;if(c)col=i===c.m?Y:(i<c.l||i>c.h?B:A);return `<div class="barw"><span class="muted">${v}</span><div class="bar" style="height:34px;background:${col};border-radius:7px">${i}</div></div>`}
function selectAlgo(pos){return `<select class="inp" onchange="stop('c${pos}');S.compare.${pos}.algo=this.value;S.compare.${pos}.run=null;render()">${Object.keys(names).map(id=>`<option value="${id}" ${S.compare[pos].algo===id?'selected':''}>${names[id]}</option>`).join('')}</select>`}
function compare(){return `<div class="compare-hero"><div>${title('Compare Algorithms','Custom input','Setiap panel bisa memakai angka sendiri. Kalau pilih Binary Search, target wajib diisi.')}</div><div class="provider-chip">Auto Play</div></div><div class="grid">${mini('l')}${mini('r')}</div>`}
function chat(){if(!msgs.length)msgs=[{role:'assistant',text:drawer?`Saya AI pendamping untuk ${topic}. Kamu bisa langsung bertanya tanpa memasukkan API key.`:'Halo! AI gratis sudah aktif. Tanya apa saja tentang algoritma dan pemrograman.'}];return `<div class="card soft"><div class="row" style="justify-content:space-between;align-items:center"><div><b>AI Gratis</b><div class="muted">Tidak perlu API key dari pengguna. Jawaban memakai layanan AI publik.</div></div><span class="provider-chip">Aktif</span></div></div><div class="chat" id="chat">${msgs.map(m=>`<div class="bubble ${m.role==='user'?'user':'ai'}">${e(m.text)}</div>`).join('')}</div><div class="row" style="margin-top:12px"><input id="ask" class="inp" placeholder="Tanya sesuatu..." onkeydown="if(event.key==='Enter')send()"><button class="btn primary" onclick="send()">Kirim</button></div>`}
async function send(){let q=document.getElementById('ask')?.value.trim();if(!q)return;msgs.push({role:'user',text:q});render();let context=drawer?`Kamu tutor ${topic}. `:'Kamu asisten algoritma. ';let prompt=encodeURIComponent(`${context}Jawab dalam Bahasa Indonesia, jelas, singkat, dan praktis.\n${msgs.map(m=>`${m.role}: ${m.text}`).join('\n')}\nassistant:`);try{let r=await fetch('https://text.pollinations.ai/'+prompt+'?model=openai');if(!r.ok)throw Error('AI gratis sedang sibuk');let ans=(await r.text()).trim();msgs.push({role:'assistant',text:ans||'Respons AI kosong.'})}catch(err){msgs.push({role:'assistant',text:'AI sedang tidak bisa menjawab. Coba lagi sebentar.'})}render()}
function openAI(){drawer=true;topic={binary:'Binary Search',bubble:'Bubble Sort',selection:'Selection Sort'}[tab];msgs=[];render()}function setTab(x){stopAll();tab=x;drawer=false;topic='algoritma';msgs=[];render()}
function render(){let body=tab==='binary'?binary():tab==='bubble'?sort('bubble'):tab==='selection'?sort('selection'):tab==='compare'?compare():title('AI Chat','Tanpa API','AI langsung bisa dipakai oleh pengunjung. API key tidak ditampilkan di UI.')+chat();document.getElementById('app').innerHTML=`<div class="top"><div class="title">Algorithm Visualizer AI</div><div class="sub">Binary Search • Bubble Sort • Selection Sort • AI Chat</div><div class="tabs">${[['binary','Binary'],['bubble','Bubble'],['selection','Selection'],['compare','Compare'],['chat','AI Chat']].map(x=>`<button class="tab ${tab===x[0]?'on':''}" onclick="setTab('${x[0]}')">${x[1]}</button>`).join('')}</div></div><main class="wrap">${body}</main>${['binary','bubble','selection'].includes(tab)?'<button class="fab" onclick="openAI()">AI</button>':''}${drawer?`<div class="drawer"><div class="head"><div><b>AI Pendamping</b><div class="muted">${topic}</div></div><button class="btn" onclick="drawer=false;render()">X</button></div>${chat()}</div>`:''}`;setTimeout(()=>{let c=document.getElementById('chat');if(c)c.scrollTop=c.scrollHeight},0)}
render();
</script></body></html>
