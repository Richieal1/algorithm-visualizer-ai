<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Algorithm Visualizer AI</title>
<style>
:root{--bg:#090b12;--panel:#11141d;--panel2:#171b28;--soft:#202638;--line:#2a3248;--text:#edf2ff;--muted:#8d96b3;--blue:#4f7ef5;--green:#35d48b;--amber:#f4aa35;--red:#ef6574}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Segoe UI,system-ui,sans-serif}button,input,select{font:inherit}button{cursor:pointer}button:disabled{opacity:.45;cursor:not-allowed}.top{position:sticky;top:0;z-index:3;background:#0e111a;border-bottom:1px solid var(--line);padding:15px 22px 0}.brand{font-size:20px;font-weight:850}.sub{color:var(--muted);font-size:12px;margin-top:3px}.tabs{display:flex;gap:4px;overflow:auto;margin-top:13px}.tab{background:transparent;border:0;color:var(--muted);padding:10px 14px;border-bottom:2px solid transparent}.tab.on{color:var(--blue);border-color:var(--blue);font-weight:800}.wrap{max-width:1060px;margin:auto;padding:22px}.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:15px;margin:14px 0}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:end}.field{flex:1;min-width:190px}.label{font-size:12px;color:var(--muted);margin:0 0 6px}.inp{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:10px 12px;outline:none}.btn{background:var(--soft);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:10px 15px;font-weight:750}.primary{background:var(--blue);border-color:var(--blue);color:white}.play{background:#102f22;border-color:#2fba7b;color:var(--green)}.pause{background:#30230f;border-color:#ba7b22;color:var(--amber)}.danger{background:#311820;border-color:#a74758;color:#ff9ba6}.hint,.muted{color:var(--muted);font-size:12px}.msg{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:12px 14px;margin:14px 0;line-height:1.55}.cells{display:flex;gap:7px;flex-wrap:wrap;align-items:flex-end}.cell{display:flex;flex-direction:column;gap:4px;align-items:center}.box{width:48px;height:46px;border-radius:8px;border:2px solid var(--line);background:var(--panel2);display:flex;align-items:center;justify-content:center;font-weight:850;font-family:Consolas,monospace}.bars{height:170px;display:flex;align-items:flex-end;gap:5px}.barwrap{flex:1;min-width:0;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:3px}.bar{width:100%;min-height:8px;border-radius:6px 6px 0 0;background:var(--blue);display:flex;align-items:center;justify-content:center;color:white;font-size:10px;font-weight:800}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:14px}.statrow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}.stat{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px}.stat b{display:block;color:var(--muted);font-size:11px;margin-bottom:4px}.badge,.chip{display:inline-flex;align-items:center;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:800}.badge{background:#4f7ef522;border:1px solid #4f7ef566;color:#9cb6ff}.chip{background:#10301f;border:1px solid #35d48b66;color:var(--green)}.chip.api{background:#111a33;border-color:#4f7ef566;color:#a7bbff}.hero{display:flex;justify-content:space-between;gap:16px;align-items:center;background:linear-gradient(180deg,#151a28,#10131d);border:1px solid var(--line);border-radius:10px;padding:16px;margin:14px 0}.arena{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:12px}.progress{height:6px;background:#0b0e16;border-radius:999px;overflow:hidden;margin:10px 0}.progress i{display:block;height:100%;background:var(--blue)}.chat{height:380px;overflow:auto;display:flex;flex-direction:column;gap:10px}.bubble{max-width:84%;padding:11px 14px;border-radius:16px;background:var(--panel2);border:1px solid var(--line);white-space:pre-wrap;line-height:1.55}.bubble.user{align-self:flex-end;background:var(--blue);border-color:var(--blue)}.bubble.ai{align-self:flex-start}.fab{position:fixed;right:22px;bottom:24px;width:56px;height:56px;border-radius:50%;background:var(--blue);border:1px solid var(--blue);color:white;font-weight:900;box-shadow:0 15px 40px #0008}.drawer{position:fixed;right:0;top:0;width:min(390px,94vw);height:100vh;background:var(--panel);border-left:1px solid var(--line);z-index:5;padding:14px;display:flex;flex-direction:column}.drawerHead{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:12px}h2{font-size:18px;margin:0 0 6px}h3{font-size:15px;margin:0}.smallbar{height:34px;border-radius:7px;background:var(--blue);display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:800}@media(max-width:740px){.wrap{padding:16px}.drawer{width:100vw}.statrow{grid-template-columns:1fr}.hero{align-items:flex-start;flex-direction:column}.box{width:44px}.top{padding-left:16px;padding-right:16px}}
</style>
</head>
<body><div id="app"></div>
<script>
const API_PROXY='https://algorithm-ai-proxy.kamuharustau476.workers.dev';
const C={blue:'#4f7ef5',green:'#35d48b',amber:'#f4aa35',red:'#ef6574',muted:'#8d96b3',line:'#2a3248',dark:'#171b28'};
let tab='binary',drawer=false,topic='algoritma',msgs=[],timers={},aiProvider=localStorage.getItem('ai_provider')||'free';
const names={binary:'Binary Search',bubble:'Bubble Sort',selection:'Selection Sort'};
const meta={binary:['O(log n)','Mencari target','Data harus terurut','Bagi dua'],bubble:['O(n^2)','Mengurutkan data','Data boleh acak','Tukar tetangga'],selection:['O(n^2)','Mengurutkan data','Data boleh acak','Cari minimum']};
const S={binary:{inp:'2 5 8 12 16 23 38 56 72 91',tgt:'23',arr:[],steps:[],i:-1,play:false},bubble:{inp:'64 34 25 12 22 11 90 45 37 60',steps:[],i:-1,play:false},selection:{inp:'64 34 25 12 22 11 90 45 37 60',steps:[],i:-1,play:false},compare:{l:{algo:'binary',inp:'2 5 8 12 16 23 38 56 72 91',tgt:'23',run:null},r:{algo:'bubble',inp:'64 34 25 12 22 11 90 45 37 60',tgt:'23',run:null}}};
function esc(x){return String(x).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function nums(x){return x.trim().split(/\s+/).map(Number).filter(Number.isFinite)}
function head(t,b,d){return `<h2>${t} <span class="badge">${b}</span></h2><div class="muted">${d}</div>`}
function stop(id){clearInterval(timers[id]);delete timers[id];if(S[id])S[id].play=false;let p=id[0]==='c'&&S.compare[id[1]];if(p&&p.run)p.run.play=false}
function stopAll(){['binary','bubble','selection','cl','cr'].forEach(stop)}
function binarySteps(a,t){let s=[],l=0,h=a.length-1;while(l<=h){let m=Math.floor((l+h)/2),found=a[m]===t;s.push({l,h,m,found,done:found});if(found)break;if(a[m]<t)l=m+1;else h=m-1}if(!s.length)s.push({l:0,h:-1,m:-1,found:false,done:true});s[s.length-1].done=true;return s}
function bubbleSteps(input){let a=[...input],s=[],n=a.length,ok=Array(n).fill(false);for(let i=0;i<n-1;i++){for(let j=0;j<n-1-i;j++){s.push({a:[...a],c:[j,j+1],swap:false,ok:[...ok],x:a[j],y:a[j+1]});if(a[j]>a[j+1]){[a[j],a[j+1]]=[a[j+1],a[j]];s.push({a:[...a],c:[j,j+1],swap:true,ok:[...ok],x:a[j+1],y:a[j]})}}ok[n-1-i]=true}ok[0]=true;s.push({a:[...a],c:[],swap:false,ok,done:true});return s}
function selectionSteps(input){let a=[...input],s=[],n=a.length,ok=Array(n).fill(false);for(let i=0;i<n-1;i++){let min=i;for(let j=i+1;j<n;j++){s.push({a:[...a],c:[min,j],swap:false,ok:[...ok],x:a[min],y:a[j]});if(a[j]<a[min])min=j}if(min!==i){let x=a[i],y=a[min];[a[i],a[min]]=[a[min],a[i]];s.push({a:[...a],c:[i,min],swap:true,ok:[...ok],x,y})}ok[i]=true}ok[n-1]=true;s.push({a:[...a],c:[],swap:false,ok,done:true});return s}
function buildMain(id){if(id==='binary'){let raw=nums(S.binary.inp);if(!raw.length)return false;S.binary.arr=[...new Set(raw)].sort((a,b)=>a-b);let t=Number(S.binary.tgt);if(!Number.isFinite(t))return false;S.binary.steps=binarySteps(S.binary.arr,t);S.binary.i=0}else{let raw=nums(S[id].inp).slice(0,16);if(raw.length<2)return false;S[id].steps=id==='bubble'?bubbleSteps(raw):selectionSteps(raw);S[id].i=0}S[id].play=false;return true}
function runMain(id){stop(id);buildMain(id);render()}function stepMain(id,d){stop(id);let s=S[id];if(!s.steps.length)return;s.i=Math.max(0,Math.min(s.steps.length-1,s.i+d));render()}function playMain(id){let s=S[id];if(!s.steps.length&&!buildMain(id))return;if(s.i>=s.steps.length-1)s.i=0;if(s.play){stop(id);render();return}s.play=true;timers[id]=setInterval(()=>{let x=S[id];if(x.i>=x.steps.length-1){stop(id);render();return}x.i++;render()},650);render()}
function controls(id){let s=S[id];return `<div class="toolbar"><button class="btn primary" onclick="runMain('${id}')">Mulai</button><button class="btn ${s.play?'pause':'play'}" onclick="playMain('${id}')">${s.play?'Pause':'Play'}</button><button class="btn" onclick="stepMain('${id}',-1)" ${s.i<=0?'disabled':''}>Prev</button><button class="btn" onclick="stepMain('${id}',1)" ${!s.steps.length||s.i>=s.steps.length-1?'disabled':''}>Next</button><button class="btn" onclick="stop('${id}');S.${id}.i=0;render()" ${!s.steps.length?'disabled':''}>Reset</button><span class="muted">${s.steps.length?`Langkah ${s.i+1}/${s.steps.length}`:'Belum mulai'}</span></div>`}
function binaryCell(v,i,c){let bg=C.dark,bd=C.line,tx='#edf2ff',label='.';if(c){if(i<c.l||i>c.h){bg='#10131b';tx=C.muted}else{bd=C.blue}if(i===c.m){bg='#2a2012';bd=C.amber;tx=C.amber;label='mid'}if(i===c.l&&i!==c.m)label='L';if(i===c.h&&i!==c.m)label=label==='.'?'R':'L=R';if(c.found&&i===c.m){bg='#0f2b20';bd=C.green;tx=C.green}}return `<div class="cell"><span class="muted">${label}</span><div class="box" style="background:${bg};border-color:${bd};color:${tx}">${v}</div><span class="muted">${i}</span></div>`}
function binaryView(){let s=S.binary,c=s.steps[s.i],msg='Masukkan array dan target, lalu klik Mulai atau Play.';if(c)msg=c.found?`Target ${s.tgt} ditemukan di indeks ${c.m}.`:c.done?`Target ${s.tgt} tidak ada di array.`:s.arr[c.m]<Number(s.tgt)?`Nilai mid ${s.arr[c.m]} lebih kecil dari target, cari ke kanan.`:`Nilai mid ${s.arr[c.m]} lebih besar dari target, cari ke kiri.`;return `${head('Binary Search','O(log n)','Binary Search mencari target pada array terurut. Input acak akan diurutkan otomatis.')}<div class="card"><div class="toolbar"><div class="field"><div class="label">Array angka</div><input class="inp" value="${esc(s.inp)}" oninput="S.binary.inp=this.value"><div class="hint">Pisahkan angka dengan spasi.</div></div><div style="width:150px"><div class="label">Target wajib</div><input class="inp" value="${esc(s.tgt)}" oninput="S.binary.tgt=this.value"></div></div></div><div class="card"><div class="cells">${s.arr.map((v,i)=>binaryCell(v,i,c)).join('')}</div></div><div class="msg">${msg}</div>${controls('binary')}`}
function bar(v,i,c,max){let col=C.blue;if(c){if(c.ok&&c.ok[i])col=C.green;else if(c.c&&c.c.includes(i))col=c.swap?C.red:C.amber}return `<div class="barwrap"><span class="muted">${v}</span><div class="bar" style="height:${Math.max(v/max*135,8)}px;background:${col}"></div><span class="muted">${i}</span></div>`}
function sortView(id){let s=S[id],is=id==='selection',c=s.steps[s.i],arr=c?c.a:[],max=Math.max(...arr,1),msg='Masukkan angka, lalu klik Mulai atau Play.';if(c)msg=c.done?'Array sudah terurut.':c.swap?`Tukar ${c.x} dengan ${c.y}.`:is?`Cari minimum: bandingkan ${c.x} dengan ${c.y}.`:`Bandingkan ${c.x} dengan ${c.y}.`;return `${head(is?'Selection Sort':'Bubble Sort','O(n^2)',is?'Cari nilai paling kecil dari sisa array lalu pindahkan ke posisi benar.':'Bandingkan elemen bersebelahan lalu tukar jika urutannya salah.')}<div class="card"><div class="field"><div class="label">Array angka</div><input class="inp" value="${esc(s.inp)}" oninput="S.${id}.inp=this.value"><div class="hint">Maksimal 16 angka agar visual tetap rapi.</div></div></div><div class="card"><div class="bars">${arr.map((v,i)=>bar(v,i,c,max)).join('')}</div></div><div class="msg">${msg}</div>${controls(id)}`}
function selectAlgo(pos){return `<select class="inp" onchange="stop('c${pos}');S.compare.${pos}.algo=this.value;S.compare.${pos}.run=null;render()">${Object.keys(names).map(id=>`<option value="${id}" ${S.compare[pos].algo===id?'selected':''}>${names[id]}</option>`).join('')}</select>`}
function previewArray(p){let raw=nums(p.inp).slice(0,16);return p.algo==='binary'?[...new Set(raw)].sort((a,b)=>a-b):raw}
function buildCompare(pos){let p=S.compare[pos],raw=nums(p.inp).slice(0,16);if(p.algo==='binary'){if(!raw.length)return false;let arr=[...new Set(raw)].sort((a,b)=>a-b),t=Number(p.tgt);if(!Number.isFinite(t))return false;p.run={id:p.algo,arr,target:t,steps:binarySteps(arr,t),i:0,play:false}}else{if(raw.length<2)return false;p.run={id:p.algo,arr:raw,target:null,steps:p.algo==='bubble'?bubbleSteps(raw):selectionSteps(raw),i:0,play:false}}return true}
function runCmp(pos){stop('c'+pos);buildCompare(pos);render()}function stepCmp(pos,d){stop('c'+pos);let r=S.compare[pos].run;if(!r)return;r.i=Math.max(0,Math.min(r.steps.length-1,r.i+d));render()}function playCmp(pos){let p=S.compare[pos];if(!p.run&&!buildCompare(pos))return;let r=p.run;if(r.i>=r.steps.length-1)r.i=0;if(r.play){stop('c'+pos);render();return}r.play=true;timers['c'+pos]=setInterval(()=>{let run=S.compare[pos].run;if(!run||run.i>=run.steps.length-1){stop('c'+pos);render();return}run.i++;render()},650);render()}
function compareMsg(id,r,c){if(!r)return id==='binary'?'Isi array dan target, lalu Mulai atau Play.':'Isi array, lalu Mulai atau Play.';if(id==='binary')return c.found?`Target ${r.target} ditemukan di indeks ${c.m}.`:c.done?`Target ${r.target} tidak ditemukan.`:`Cek indeks tengah ${c.m}, nilainya ${r.arr[c.m]}.`;if(c.done)return 'Array sudah terurut.';return c.swap?`Tukar ${c.x} dan ${c.y}.`:`Bandingkan ${c.x} dan ${c.y}.`}
function smallBinary(v,i,c){let col=C.blue;if(c)col=i===c.m?C.amber:(i<c.l||i>c.h?C.line:C.blue);return `<div class="barwrap"><span class="muted">${v}</span><div class="smallbar" style="background:${col}">${i}</div></div>`}
function mini(pos){let p=S.compare[pos],id=p.algo,r=p.run,c=r&&r.steps[r.i],arr=id==='binary'?(r?r.arr:previewArray(p)):(c?c.a:previewArray(p)),max=Math.max(...arr,1),m=meta[id],pct=r?Math.round((r.i+1)/r.steps.length*100):0;return `<div class="card"><div class="toolbar"><div class="field"><div class="label">Algoritma</div>${selectAlgo(pos)}</div><div class="field"><div class="label">Array angka</div><input class="inp" value="${esc(p.inp)}" oninput="stop('c${pos}');S.compare.${pos}.inp=this.value;S.compare.${pos}.run=null;render()"></div>${id==='binary'?`<div style="width:135px"><div class="label">Target wajib</div><input class="inp" value="${esc(p.tgt)}" oninput="stop('c${pos}');S.compare.${pos}.tgt=this.value;S.compare.${pos}.run=null;render()"></div>`:''}</div><div class="toolbar" style="justify-content:space-between;margin-top:12px"><div><h3>${names[id]}</h3><div class="muted">${r?`Langkah ${r.i+1}/${r.steps.length}`:'Belum mulai'}</div></div><span class="badge">${m[0]}</span></div><div class="statrow"><div class="stat"><b>Tujuan</b>${m[1]}</div><div class="stat"><b>Data</b>${m[2]}</div><div class="stat"><b>Proses</b>${m[3]}</div></div><div class="arena"><div class="bars" style="height:145px">${arr.map((v,i)=>id==='binary'?smallBinary(v,i,c):bar(v,i,c,max)).join('')}</div><div class="progress"><i style="width:${pct}%"></i></div><div class="msg">${compareMsg(id,r,c)}</div></div><div class="toolbar" style="margin-top:12px"><button class="btn primary" onclick="runCmp('${pos}')">Mulai</button><button class="btn ${r&&r.play?'pause':'play'}" onclick="playCmp('${pos}')">${r&&r.play?'Pause':'Play'}</button><button class="btn" onclick="stepCmp('${pos}',-1)" ${!r||r.i<=0?'disabled':''}>Prev</button><button class="btn" onclick="stepCmp('${pos}',1)" ${!r||r.i>=r.steps.length-1?'disabled':''}>Next</button><button class="btn" onclick="stop('c${pos}');if(S.compare.${pos}.run)S.compare.${pos}.run.i=0;render()" ${!r?'disabled':''}>Reset</button></div></div>`}
function compareView(){return `<div class="hero"><div>${head('Compare Algorithms','custom input','Bandingkan proses dua algoritma. Binary Search selalu punya target wajib.')}</div><span class="chip">Ada autoplay</span></div><div class="grid">${mini('l')}${mini('r')}</div>`}
function providerName(){return aiProvider==='free'?'AI Gratis':aiProvider==='gemini'?'Gemini API':aiProvider==='groq'?'Groq API':'OpenRouter'}
function chatView(){if(!msgs.length)msgs=[{role:'assistant',text:'Halo! Pilih AI Gratis, Gemini, Groq, atau OpenRouter. Provider API sekarang lewat Cloudflare proxy, jadi key tidak muncul di halaman publik.'}];return `<div class="card"><div class="toolbar"><div class="field"><div class="label">Provider AI</div><select class="inp" onchange="aiProvider=this.value;localStorage.setItem('ai_provider',aiProvider);render()"><option value="free" ${aiProvider==='free'?'selected':''}>AI Gratis</option><option value="gemini" ${aiProvider==='gemini'?'selected':''}>Gemini API</option><option value="groq" ${aiProvider==='groq'?'selected':''}>Groq API</option><option value="openrouter" ${aiProvider==='openrouter'?'selected':''}>OpenRouter</option></select></div><span class="chip ${aiProvider==='free'?'':'api'}">${providerName()}</span></div><div class="hint">API key disimpan sebagai secret Cloudflare Worker, bukan di UI website.</div></div><div class="chat" id="chat">${msgs.map(m=>`<div class="bubble ${m.role==='user'?'user':'ai'}">${esc(m.text)}</div>`).join('')}</div><div class="toolbar" style="margin-top:12px"><input id="ask" class="inp" placeholder="Tanya sesuatu..." onkeydown="if(event.key==='Enter')send()"><button class="btn primary" onclick="send()">Kirim</button></div>`}
async function askFree(prompt){let r=await fetch('https://text.pollinations.ai/'+encodeURIComponent(prompt)+'?model=openai');if(!r.ok)throw Error('AI gratis sedang sibuk');return (await r.text()).trim()}
async function askProxy(provider,prompt){let r=await fetch(API_PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({provider,prompt})});let j=await r.json().catch(()=>({error:'Respons proxy tidak valid'}));if(!r.ok||j.error)throw Error(j.error||'Proxy AI gagal');return (j.text||'').trim()}
async function send(){let box=document.getElementById('ask'),q=box&&box.value.trim();if(!q)return;msgs.push({role:'user',text:q});render();let prompt=`Kamu tutor algoritma untuk aplikasi visualizer. Jawab dalam Bahasa Indonesia, jelas, singkat, dan praktis. Topik saat ini: ${drawer?topic:tab}.\n\n${msgs.map(m=>`${m.role}: ${m.text}`).join('\n')}\nassistant:`;try{let ans=aiProvider==='free'?await askFree(prompt):await askProxy(aiProvider,prompt);msgs.push({role:'assistant',text:ans||'Respons AI kosong.'})}catch(err){msgs.push({role:'assistant',text:`${providerName()} error: ${err.message}`})}render()}
function openAI(){drawer=true;topic={binary:'Binary Search',bubble:'Bubble Sort',selection:'Selection Sort'}[tab]||'algoritma';msgs=[];render()}function setTab(x){stopAll();tab=x;drawer=false;topic='algoritma';msgs=[];render()}
function render(){let body=tab==='binary'?binaryView():tab==='bubble'?sortView('bubble'):tab==='selection'?sortView('selection'):tab==='compare'?compareView():head('AI Chat','Cloudflare proxy','Pilih AI Gratis, Gemini, Groq, atau OpenRouter tanpa menampilkan API key.')+chatView();document.getElementById('app').innerHTML=`<header class="top"><div class="brand">Algorithm Visualizer AI</div><div class="sub">Binary Search - Bubble Sort - Selection Sort - Compare - AI Chat</div><nav class="tabs">${[['binary','Binary'],['bubble','Bubble'],['selection','Selection'],['compare','Compare'],['chat','AI Chat']].map(x=>`<button class="tab ${tab===x[0]?'on':''}" onclick="setTab('${x[0]}')">${x[1]}</button>`).join('')}</nav></header><main class="wrap">${body}</main>${['binary','bubble','selection'].includes(tab)?'<button class="fab" onclick="openAI()">AI</button>':''}${drawer?`<aside class="drawer"><div class="drawerHead"><div><b>AI Pendamping</b><div class="muted">${topic}</div></div><button class="btn" onclick="drawer=false;render()">X</button></div>${chatView()}</aside>`:''}`;setTimeout(()=>{let c=document.getElementById('chat');if(c)c.scrollTop=c.scrollHeight},0)}
render();
</script></body>
</html>
