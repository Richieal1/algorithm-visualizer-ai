<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Algorithm Visualizer AI</title>
<style>
:root{--bg:#090b12;--surface:#11141e;--panel:#181b28;--border:#242a3d;--text:#e7ebf8;--muted:#7a809b;--blue:#4f7ef5;--green:#35d48b;--amber:#f3a524;--red:#f06472;--purple:#a78bfa;--cyan:#35c4e8}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Segoe UI,system-ui,sans-serif}button,input,select{font:inherit}button{cursor:pointer;transition:.16s}button:hover:not(:disabled){opacity:.86}button:disabled{opacity:.45;cursor:not-allowed}.top{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px 0}.title{font-size:20px;font-weight:800}.sub,.muted{color:var(--muted);font-size:12px}.tabs{display:flex;gap:2px;overflow:auto;margin-top:12px}.tab{background:0;border:0;color:var(--muted);padding:10px 16px;border-bottom:2px solid transparent;white-space:nowrap}.tab.on{color:var(--blue);border-color:var(--blue);font-weight:700}.wrap{max-width:980px;margin:auto;padding:24px}.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin:14px 0}.soft{background:var(--panel)}.row{display:flex;gap:10px;flex-wrap:wrap}.field{flex:1;min-width:180px}.label{color:var(--muted);font-size:12px;margin:0 0 5px}.inp{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 12px;outline:0}.btn{background:var(--panel);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 16px;font-weight:700}.primary{background:var(--blue);border-color:var(--blue);color:white}.play{background:#10301f;border-color:#35d48b66;color:var(--green)}.pause{background:#2d2110;border-color:#f3a52466;color:var(--amber)}.msg{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:11px 14px;margin:14px 0;line-height:1.55;font-size:13px}.cells{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end}.cell{display:flex;flex-direction:column;align-items:center;gap:3px}.box{width:44px;height:44px;border-radius:8px;border:2px solid var(--border);background:var(--panel);display:flex;align-items:center;justify-content:center;font-weight:800;font-family:monospace}.bars{height:165px;display:flex;align-items:flex-end;gap:4px}.barw{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:2px;min-width:0}.bar{width:100%;min-height:7px;border-radius:4px 4px 0 0;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:white}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:14px}.chat{height:390px;overflow:auto;display:flex;flex-direction:column;gap:10px}.bubble{max-width:82%;padding:10px 14px;border-radius:16px;background:var(--panel);border:1px solid var(--border);white-space:pre-wrap;line-height:1.6}.user{align-self:flex-end;background:var(--blue);border-color:var(--blue);color:white}.ai{align-self:flex-start}.fab{position:fixed;right:22px;bottom:24px;width:54px;height:54px;border-radius:50%;background:var(--blue);border:1px solid var(--blue);color:white;font-weight:900;box-shadow:0 10px 30px #0008}.drawer{position:fixed;right:0;top:0;width:min(390px,94vw);height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:5;padding:14px;display:flex;flex-direction:column}.head{display:flex;justify-content:space-between;gap:12px;align-items:center;border-bottom:1px solid var(--border);padding-bottom:12px;margin-bottom:12px}h2{font-size:17px;margin:0 0 6px}.badge,.pill{font-size:11px;color:var(--blue);background:#4f7ef522;border:1px solid #4f7ef566;border-radius:6px;padding:3px 8px;margin-left:8px}.pill{margin:0;color:var(--text);background:var(--panel);border-color:var(--border)}.note{font-size:11px;color:var(--muted);margin-top:6px}.compare-hero{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;background:linear-gradient(180deg,#151a28,#10131d);border:1px solid var(--border);border-radius:10px;padding:16px;margin:14px 0}.compare-controls{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0}.compare-card{background:#10131d;border:1px solid var(--border);border-radius:10px;padding:14px;min-width:0}.compare-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:12px}.algo-name{font-size:16px;font-weight:800}.statline{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}.stat{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:9px}.stat b{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}.arena{background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:12px}.stepbar{height:6px;background:#0c0f18;border-radius:99px;overflow:hidden;margin:10px 0}.stepbar i{display:block;height:100%;background:var(--blue);width:0}.mini-msg{min-height:48px;color:var(--text);font-size:13px;line-height:1.5}.provider-chip{display:inline-flex;align-items:center;gap:6px;background:#10301f;border:1px solid #35d48b66;color:var(--green);border-radius:99px;padding:5px 10px;font-size:12px;font-weight:700}@media(max-width:720px){.wrap{padding:18px}.compare-controls{grid-template-columns:1fr}.statline{grid-template-columns:1fr}.fab{right:14px;bottom:16px}.drawer{width:100vw}.top{padding-left:16px;padding-right:16px}}
</style>
</head>
<body><div id="app"></div><script>
const css=getComputedStyle(document.documentElement),A=css.getPropertyValue('--blue').trim(),G=css.getPropertyValue('--green').trim(),Y=css.getPropertyValue('--amber').trim(),R=css.getPropertyValue('--red').trim(),P=css.getPropertyValue('--purple').trim(),M=css.getPropertyValue('--muted').trim(),B=css.getPropertyValue('--border').trim();
let tab='binary',drawer=false,topic='algoritma',msgs=[],compareTimers={};
const names={binary:'Binary Search',bubble:'Bubble Sort',selection:'Selection Sort'};
const meta={binary:{big:'O(log n)',goal:'Mencari target',data:'Harus terurut',style:'Bagi dua'},bubble:{big:'O(n^2)',goal:'Mengurutkan',data:'Boleh acak',style:'Tukar tetangga'},selection:{big:'O(n^2)',goal:'Mengurutkan',data:'Boleh acak',style:'Cari minimum'}};
const S={binary:{inp:'2 5 8 12 16 23 38 56 72 91',tgt:'23',arr:[],steps:[],i:-1},bubble:{inp:'64 34 25 12 22 11 90 45 37 60',steps:[],i:-1},selection:{inp:'64 34 25 12 22 11 90 45 37 60',steps:[],i:-1},compare:{l:'binary',r:'bubble',runs:{}}};
function e(x){return String(x).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function ns(x){return x.trim().split(/\s+/).map(Number).filter(Number.isFinite)}
function bs(a,t){let s=[],l=0,h=a.length-1;while(l<=h){let m=Math.floor((l+h)/2),f=a[m]===t;s.push({l,h,m,f:f?m:-1,d:f});if(f)break;a[m]<t?l=m+1:h=m-1}if(!s.length)s=[{l:0,h:-1,m:-1,f:-1,d:true}];s[s.length-1].d=true;return s}
function bub(a){a=[...a];let s=[],n=a.length,ok=Array(n).fill(false);for(let i=0;i<n-1;i++){for(let j=0;j<n-1-i;j++){let x=a[j],y=a[j+1];s.push({a:[...a],c:[j,j+1],sw:false,ok:[...ok],x,y});if(a[j]>a[j+1]){[a[j],a[j+1]]=[a[j+1],a[j]];s.push({a:[...a],c:[j,j+1],sw:true,ok:[...ok],x,y})}}ok[n-1-i]=true}ok[0]=true;s.push({a:[...a],c:[],sw:false,ok,d:true});return s}
function sel(a){a=[...a];let s=[],n=a.length,ok=Array(n).fill(false);for(let i=0;i<n-1;i++){let m=i;for(let j=i+1;j<n;j++){s.push({a:[...a],c:[m,j],sw:false,ok:[...ok],x:a[m],y:a[j]});if(a[j]<a[m])m=j}if(m!==i){let x=a[i],y=a[m];[a[i],a[m]]=[a[m],a[i]];s.push({a:[...a],c:[i,m],sw:true,ok:[...ok],x,y})}ok[i]=true}ok[n-1]=true;s.push({a:[...a],c:[],sw:false,ok,d:true});return s}
function title(t,b,d){return `<h2>${t}<span class="badge">${b}</span></h2><p class="muted">${d}</p>`}
function controls(id){let s=S[id];return `<div class="row"><button class="btn" onclick="move('${id}',-1)" ${s.i<=0?'disabled':''}>Prev</button><button class="btn" onclick="move('${id}',1)" ${s.i>=s.steps.length-1?'disabled':''}>Next</button><button class="btn" onclick="S.${id}.i=0;render()">Reset</button><span class="muted">Langkah ${s.i+1}/${s.steps.length}</span></div>`}
function binary(){let s=S.binary,c=s.steps[s.i],msg='Masukkan array dan target, lalu klik Mulai';if(c)msg=c.f>=0?`Nilai ${s.tgt} ditemukan di indeks ${c.f}.`:c.d?`Nilai ${s.tgt} tidak ada dalam array.`:s.arr[c.m]<+s.tgt?`Mid ${s.arr[c.m]} lebih kecil, geser Left ke ${c.m+1}.`:`Mid ${s.arr[c.m]} lebih besar, geser Right ke ${c.m-1}.`;return title('Binary Search','O(log n)','Binary Search harus memakai array terurut. Input acak akan diurutkan otomatis.')+`<div class="row"><div class="field"><div class="label">Array angka</div><input class="inp" value="${e(s.inp)}" oninput="S.binary.inp=this.value"><div class="note">Target pencarian adalah angka yang ingin dicari di array.</div></div><div style="width:130px"><div class="label">Target</div><input class="inp" value="${e(s.tgt)}" oninput="S.binary.tgt=this.value"></div><button class="btn primary" style="align-self:flex-end" onclick="runBinary()">Mulai</button></div><div class="card"><div class="cells">${s.arr.map((v,i)=>{let bg='#181b28',bd=B,tx='#dde1f0',lab='.';if(c){if(i===c.m){bg='#2a2012';bd=Y;tx=Y;lab='mid'}else if(i<c.l||i>c.h){bg='#11141e';tx=M}else{bg='#141b2e';bd=A}if(i===c.l&&i!==c.m)lab='L';if(i===c.h&&i!==c.m)lab=lab==='.'?'R':'L=R';if(c.f>=0&&i===c.m){bg='#0e2a1f';bd=G;tx=G}}return `<div class="cell"><span class="muted">${lab}</span><div class="box" style="background:${bg};border-color:${bd};color:${tx}">${v}</div><span class="muted">${i}</span></div>`}).join('')}</div></div><div class="msg">${msg}</div>${s.steps.length?controls('binary'):''}`}
function sort(id){let s=S[id],is=id==='selection',c=s.steps[s.i],arr=c?c.a:[],max=Math.max(...arr,1),msg='Masukkan angka dan klik Mulai';if(c)msg=c.d?'Array telah terurut.':c.sw?`Tukar ${c.x} dengan ${c.y}.`:is?`Cari minimum: bandingkan ${c.x} dengan ${c.y}.`:`Bandingkan ${c.x} dengan ${c.y}.`;return title(is?'Selection Sort':'Bubble Sort','O(n^2)',is?'Cari minimum dari sisa array lalu tukar ke posisi benar.':'Bandingkan elemen bersebelahan lalu tukar jika belum urut.')+`<div class="row"><div class="field"><div class="label">Array angka</div><input class="inp" value="${e(s.inp)}" oninput="S.${id}.inp=this.value"></div><button class="btn primary" style="align-self:flex-end" onclick="runSort('${id}')">Mulai</button></div><div class="card"><div class="bars">${arr.map((v,i)=>{let col=A;if(c){if(c.ok&&c.ok[i])col=G;else if(c.c&&c.c.includes(i))col=c.sw?R:Y}return `<div class="barw"><span class="muted">${v}</span><div class="bar" style="height:${Math.max(v/max*130,7)}px;background:${col}"></div><span class="muted">${i}</span></div>`}).join('')}</div></div><div class="msg">${msg}</div>${s.steps.length?controls(id):''}`}
function runBinary(){let raw=ns(S.binary.inp);if(!raw.length)return;S.binary.arr=[...new Set(raw)].sort((a,b)=>a-b);S.binary.steps=bs(S.binary.arr,+S.binary.tgt);S.binary.i=0;render()}function runSort(id){let raw=ns(S[id].inp).slice(0,16);if(raw.length<2)return;S[id].steps=id==='bubble'?bub(raw):sel(raw);S[id].i=0;render()}function move(id,d){S[id].i=Math.max(0,Math.min(S[id].steps.length-1,S[id].i+d));render()}
function runFor(id){let base=id==='binary'?[2,5,8,12,16,23,38,56,72,91]:[64,34,25,12,22,11,90,45,37,60];return{id,base,steps:id==='binary'?bs(base,23):id==='bubble'?bub(base):sel(base),i:0,target:23,play:false}}
function algoMsg(id,r,c){if(!r)return id==='binary'?'Target contoh 23, data sudah terurut.':'Data contoh acak siap diurutkan.';if(id==='binary')return c.f>=0?`Target 23 ditemukan di indeks ${c.f}.`:c.d?'Target 23 tidak ditemukan.':`Cek mid indeks ${c.m}. Nilainya ${r.base[c.m]}.`;if(c.d)return 'Array sudah terurut.';return c.sw?`Tukar ${c.x} dan ${c.y}.`:`Bandingkan ${c.x} dan ${c.y}.`}
function stopCmp(pos){clearInterval(compareTimers[pos]);delete compareTimers[pos];let id=S.compare[pos],r=S.compare.runs[pos+id];if(r)r.play=false}
function stopAllCmp(){['l','r'].forEach(pos=>stopCmp(pos))}
function startCmp(pos,id){stopCmp(pos);S.compare.runs[pos+id]=runFor(id);render()}
function playCmp(pos){let id=S.compare[pos],key=pos+id;if(!S.compare.runs[key])S.compare.runs[key]=runFor(id);let r=S.compare.runs[key];if(r.i>=r.steps.length-1)r.i=0;if(r.play){stopCmp(pos);render();return}r.play=true;clearInterval(compareTimers[pos]);compareTimers[pos]=setInterval(()=>{let current=S.compare[pos],run=S.compare.runs[pos+current];if(!run){stopCmp(pos);render();return}if(run.i>=run.steps.length-1){stopCmp(pos);render();return}run.i++;render()},650);render()}
function mini(pos){let id=S.compare[pos],r=S.compare.runs[pos+id],c=r&&r.steps[r.i],arr=id==='binary'?(r?r.base:[2,5,8,12,16,23,38,56,72,91]):(c?c.a:[64,34,25,12,22,11,90,45,37,60]),max=Math.max(...arr,1),m=meta[id],pct=r?Math.round((r.i+1)/r.steps.length*100):0;return `<div class="compare-card"><div class="compare-top"><div><div class="algo-name">${names[id]}</div><div class="muted">${r?`Langkah ${r.i+1}/${r.steps.length}`:'Belum mulai'}</div></div><span class="badge">${m.big}</span></div><div class="statline"><div class="stat"><b>Tujuan</b>${m.goal}</div><div class="stat"><b>Data</b>${m.data}</div><div class="stat"><b>Gaya</b>${m.style}</div></div><div class="arena"><div class="bars" style="height:145px">${arr.map((v,i)=>{let col=id==='binary'?A:A;if(c){if(id==='binary')col=i===c.m?Y:(i<c.l||i>c.h?B:A);else if(c.ok&&c.ok[i])col=G;else if(c.c&&c.c.includes(i))col=c.sw?R:Y}return `<div class="barw"><span class="muted">${v}</span><div class="bar" style="height:${id==='binary'?34:Math.max(v/max*92,8)}px;background:${col};border-radius:${id==='binary'?'7px':'4px 4px 0 0'}">${id==='binary'?i:''}</div></div>`}).join('')}</div><div class="stepbar"><i style="width:${pct}%"></i></div><div class="mini-msg">${algoMsg(id,r,c)}</div></div><div class="row" style="margin-top:12px"><button class="btn primary" onclick="startCmp('${pos}','${id}')">Mulai</button><button class="btn ${r&&r.play?'pause':'play'}" onclick="playCmp('${pos}')">${r&&r.play?'Pause':'Play'}</button><button class="btn" onclick="cmp('${pos}',-1)" ${!r||r.i<=0?'disabled':''}>Prev</button><button class="btn" onclick="cmp('${pos}',1)" ${!r||r.i>=r.steps.length-1?'disabled':''}>Next</button></div></div>`}
function selectAlgo(pos){return `<select class="inp" onchange="stopCmp('${pos}');S.compare.${pos}=this.value;render()">${Object.keys(names).map(id=>`<option value="${id}" ${S.compare[pos]===id?'selected':''}>${names[id]}</option>`).join('')}</select>`}
function compare(){return `<div class="compare-hero"><div>${title('Compare Algorithms','Mode proses','Pilih dua algoritma, tekan Play, lalu bandingkan gerakan, syarat data, dan jumlah langkahnya.')}</div><div class="provider-chip">Auto Play</div></div><div class="compare-controls"><div><div class="label">Proses kiri</div>${selectAlgo('l')}</div><div><div class="label">Proses kanan</div>${selectAlgo('r')}</div></div><div class="grid">${mini('l')}${mini('r')}</div>`}
function cmp(pos,d){stopCmp(pos);let id=S.compare[pos],r=S.compare.runs[pos+id];if(!r)return;r.i=Math.max(0,Math.min(r.steps.length-1,r.i+d));render()}
function chat(){if(!msgs.length)msgs=[{role:'assistant',text:drawer?`Saya AI pendamping untuk ${topic}. Kamu bisa langsung bertanya tanpa memasukkan API key.`:'Halo! AI gratis sudah aktif. Tanya apa saja tentang algoritma dan pemrograman.'}];return `<div class="card soft"><div class="row" style="justify-content:space-between;align-items:center"><div><b>AI Gratis</b><div class="muted">Tidak perlu API key dari pengguna. Jawaban memakai layanan AI publik.</div></div><span class="provider-chip">Aktif</span></div></div><div class="chat" id="chat">${msgs.map(m=>`<div class="bubble ${m.role==='user'?'user':'ai'}">${e(m.text)}</div>`).join('')}</div><div class="row" style="margin-top:12px"><input id="ask" class="inp" placeholder="Tanya sesuatu..." onkeydown="if(event.key==='Enter')send()"><button class="btn primary" onclick="send()">Kirim</button></div>`}
async function send(){let q=document.getElementById('ask')?.value.trim();if(!q)return;msgs.push({role:'user',text:q});render();let context=drawer?`Kamu tutor ${topic}. `:'Kamu asisten algoritma. ';let prompt=encodeURIComponent(`${context}Jawab dalam Bahasa Indonesia, jelas, singkat, dan praktis.\n${msgs.map(m=>`${m.role}: ${m.text}`).join('\n')}\nassistant:`);try{let r=await fetch('https://text.pollinations.ai/'+prompt+'?model=openai');if(!r.ok)throw Error('AI gratis sedang sibuk');let ans=(await r.text()).trim();msgs.push({role:'assistant',text:ans||'Respons AI kosong.'})}catch(err){msgs.push({role:'assistant',text:'AI sedang tidak bisa menjawab. Coba lagi sebentar.'})}render()}
function openAI(){drawer=true;topic={binary:'Binary Search',bubble:'Bubble Sort',selection:'Selection Sort'}[tab];msgs=[];render()}function setTab(x){stopAllCmp();tab=x;drawer=false;topic='algoritma';msgs=[];render()}
function render(){let body=tab==='binary'?binary():tab==='bubble'?sort('bubble'):tab==='selection'?sort('selection'):tab==='compare'?compare():title('AI Chat','Tanpa API','AI langsung bisa dipakai oleh pengunjung. API key tidak ditampilkan di UI.')+chat();document.getElementById('app').innerHTML=`<div class="top"><div class="title">Algorithm Visualizer AI</div><div class="sub">Binary Search • Bubble Sort • Selection Sort • AI Chat</div><div class="tabs">${[['binary','Binary'],['bubble','Bubble'],['selection','Selection'],['compare','Compare'],['chat','AI Chat']].map(x=>`<button class="tab ${tab===x[0]?'on':''}" onclick="setTab('${x[0]}')">${x[1]}</button>`).join('')}</div></div><main class="wrap">${body}</main>${['binary','bubble','selection'].includes(tab)?'<button class="fab" onclick="openAI()">AI</button>':''}${drawer?`<div class="drawer"><div class="head"><div><b>AI Pendamping</b><div class="muted">${topic}</div></div><button class="btn" onclick="drawer=false;render()">X</button></div>${chat()}</div>`:''}`;setTimeout(()=>{let c=document.getElementById('chat');if(c)c.scrollTop=c.scrollHeight},0)}
render();
</script></body></html>
